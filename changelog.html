<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>烤肉遊戲 開發日誌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #110800;
      color: #f0d9b0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #2a0f00 0%, #5a2200 60%, #3d1500 100%);
      padding: 28px 32px 24px;
      border-bottom: 2px solid #ff6600;
      display: flex; align-items: center; gap: 16px;
    }
    .header-icon { font-size: 2.8rem; line-height: 1; }
    .header-text h1 { font-size: 1.6rem; color: #ffcc44; letter-spacing: 1px; }
    .header-text p { font-size: 0.82rem; color: #aa7744; margin-top: 4px; }
    .back-btn {
      margin-left: auto;
      background: rgba(255,102,0,0.15);
      border: 1px solid rgba(255,102,0,0.5);
      color: #ffaa44;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,102,0,0.35); color: #ffdd88; }

    /* ── Filter bar ── */
    .filter-bar {
      max-width: 820px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 0.78rem; color: #886644; margin-right: 4px; }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid transparent;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      background: rgba(255,255,255,0.05);
      color: #bbaa88;
    }
    .filter-btn:hover { filter: brightness(1.3); }
    .filter-btn.active { color: #fff; }

    .filter-btn[data-cat="全部"].active   { border-color: #888; background: #444; }
    .filter-btn[data-cat="角色"].active   { border-color: #ff6655; background: rgba(255,80,60,0.25); color: #ff9988; }
    .filter-btn[data-cat="場地"].active   { border-color: #ffaa00; background: rgba(255,160,0,0.22); color: #ffd066; }
    .filter-btn[data-cat="道具"].active   { border-color: #44ccff; background: rgba(40,180,255,0.18); color: #88ddff; }
    .filter-btn[data-cat="系統"].active   { border-color: #88cc88; background: rgba(80,180,80,0.18); color: #aaddaa; }

    /* ── Timeline container ── */
    .container { max-width: 820px; margin: 0 auto; padding: 32px 24px 64px; }

    .timeline { position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 20px; top: 10px; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #ff6600 0%, rgba(255,102,0,0.15) 90%, transparent 100%);
    }

    /* ── Entry ── */
    .entry {
      position: relative;
      margin-bottom: 36px;
      padding-left: 56px;
    }
    .entry-dot {
      position: absolute;
      left: 12px; top: 6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #3d1a00;
      border: 2px solid #ff6600;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
    }
    .entry-date {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffcc44;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,102,0,0.25);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .entry-date .day-badge {
      font-size: 0.72rem;
      color: #886644;
      font-weight: 400;
    }
    .entry-date .summary-counts {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    /* ── Item rows ── */
    .items-list { display: flex; flex-direction: column; gap: 7px; }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }
    .item:hover { background: rgba(255,255,255,0.06); }
    .item.hidden { display: none; }

    /* ── Category badge ── */
    .cat-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 1px;
      white-space: nowrap;
    }
    .cat-badge.角色 { background: rgba(255,80,60,0.2);  color: #ff9977; border: 1px solid rgba(255,80,60,0.4); }
    .cat-badge.場地 { background: rgba(255,160,0,0.18); color: #ffcc55; border: 1px solid rgba(255,160,0,0.4); }
    .cat-badge.道具 { background: rgba(40,180,255,0.15);color: #77ddff; border: 1px solid rgba(40,180,255,0.35); }
    .cat-badge.系統 { background: rgba(80,180,80,0.15); color: #99cc99; border: 1px solid rgba(80,180,80,0.3); }

    .item-text {
      font-size: 0.88rem;
      color: #ddc499;
      line-height: 1.55;
    }

    /* ── Mini count badge ── */
    .mini-badge {
      font-size: 0.68rem;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 600;
    }
    .mini-badge.角色 { background: rgba(255,80,60,0.25);  color: #ff9977; }
    .mini-badge.場地 { background: rgba(255,160,0,0.22);  color: #ffcc55; }
    .mini-badge.道具 { background: rgba(40,180,255,0.2);  color: #77ddff; }
    .mini-badge.系統 { background: rgba(80,180,80,0.18);  color: #99cc99; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #665533;
      font-size: 0.9rem;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 60px; color: #886644; font-size: 1rem; }
    .error   { color: #ff7766; text-align: center; padding: 40px; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .header { padding: 20px 16px; gap: 12px; }
      .header-icon { font-size: 2rem; }
      .header-text h1 { font-size: 1.25rem; }
      .container { padding: 20px 12px 48px; }
      .filter-bar { padding: 0 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🥩</div>
  <div class="header-text">
    <h1>烤肉遊戲 開發日誌</h1>
    <p>每天的更動都記錄在這裡</p>
  </div>
  <a class="back-btn" href="index.html">← 回遊戲</a>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">篩選：</span>
  <button class="filter-btn active" data-cat="全部">全部</button>
  <button class="filter-btn" data-cat="角色">🥩 角色</button>
  <button class="filter-btn" data-cat="場地">🔥 場地</button>
  <button class="filter-btn" data-cat="道具">🎯 道具</button>
  <button class="filter-btn" data-cat="系統">⚙️ 系統</button>
</div>

<div class="container">
  <div class="timeline" id="timeline">
    <div class="loading">載入中…</div>
  </div>
</div>

<script>
  const CAT_ICON = { '角色': '🥩', '場地': '🔥', '道具': '🎯', '系統': '⚙️' };
  const DAYS = ['日','一','二','三','四','五','六'];
  let activeFilter = '全部';

  function getDayLabel(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return `（週${DAYS[d.getDay()]}）`;
  }

  function parseItem(raw) {
    const m = raw.match(/^\[(.+?)\]\s*(.*)/);
    if (m) return { cat: m[1].trim(), text: m[2].trim() };
    return { cat: '其他', text: raw };
  }

  function buildCounts(items) {
    const counts = {};
    items.forEach(({ cat }) => { counts[cat] = (counts[cat] || 0) + 1; });
    return counts;
  }

  function applyFilter() {
    document.querySelectorAll('.item').forEach(el => {
      const cat = el.dataset.cat;
      el.classList.toggle('hidden', activeFilter !== '全部' && cat !== activeFilter);
    });
    document.querySelectorAll('.entry').forEach(entry => {
      const visible = entry.querySelectorAll('.item:not(.hidden)').length > 0;
      entry.style.display = visible ? '' : 'none';
    });
  }

  function render(md) {
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';

    const blocks = md.split(/^## /m).filter(b => b.trim());
    blocks.forEach(block => {
      const lines = block.trim().split('\n');
      const dateStr = lines[0].trim();
      if (!dateStr) return;

      const rawItems = lines.slice(1)
        .filter(l => l.trim().startsWith('-'))
        .map(l => l.trim().replace(/^-\s*/, ''));

      const items = rawItems.map(parseItem);
      const counts = buildCounts(items);

      const entry = document.createElement('div');
      entry.className = 'entry';

      const summaryHTML = Object.entries(counts)
        .map(([cat, n]) => `<span class="mini-badge ${cat}">${CAT_ICON[cat] || ''}${cat} ${n}</span>`)
        .join('');

      const itemsHTML = items.map(({ cat, text }) =>
        `<div class="item" data-cat="${cat}">
          <span class="cat-badge ${cat}">${CAT_ICON[cat] || ''} ${cat}</span>
          <span class="item-text">${text}</span>
        </div>`
      ).join('');

      entry.innerHTML = `
        <div class="entry-dot">🔥</div>
        <div class="entry-date">
          ${dateStr}
          <span class="day-badge">${getDayLabel(dateStr)}</span>
          <div class="summary-counts">${summaryHTML}</div>
        </div>
        <div class="items-list">${itemsHTML}</div>`;

      tl.appendChild(entry);
    });

    if (!tl.children.length) {
      tl.innerHTML = '<div class="loading">還沒有紀錄</div>';
    }

    applyFilter();
  }

  // Filter buttons
  document.getElementById('filterBar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeFilter = btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    applyFilter();
  });

  // Fetch & render
  fetch('CHANGELOG.md')
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(render)
    .catch(() => {
      document.getElementById('timeline').innerHTML =
        '<div class="error">⚠ 無法載入 CHANGELOG.md</div>';
    });
</script>
</body>
</html>
